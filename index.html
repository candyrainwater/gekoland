<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="3;url=https://kae1u.github.io/gekoland/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲコランド - URL変更のお知らせ</title>

<style>
:root {
    --bg-primary: #1a1d23;
    --bg-card: #1e2229;
    --border: #2e3340;
    --text-primary: #e8eaf0;
    --text-secondary: #8a909e;
    --accent: #4ade80;
    --accent-glow: rgba(74, 222, 128, 0.25);
    --radius-xl: 24px;
    --shadow: 0 4px 24px rgba(0,0,0,.4);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#13151a;
    color:var(--text-primary);
    font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
}

.card{
    width:100%;
    max-width:560px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-xl);
    padding:40px;
    text-align:center;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at center,
        var(--accent-glow) 0%,
        transparent 70%);
    pointer-events:none;
}

.logo{
    width:90px;
    margin:0 auto 20px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

h1{
    font-size:36px;
    margin-bottom:12px;
}

h1 span{
    color:var(--accent);
}

.desc{
    color:var(--text-secondary);
    line-height:1.8;
    margin-bottom:28px;
}

.url{
    background:#13151a;
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    margin-bottom:24px;
    word-break:break-all;
}

.url a{
    color:var(--accent);
    text-decoration:none;
}

.url a:hover{
    text-decoration:underline;
}

.countdown{
    color:var(--accent);
    font-weight:700;
    margin-bottom:24px;
}

.btn{
    display:inline-block;
    background:var(--accent);
    color:#13151a;
    text-decoration:none;
    padding:12px 24px;
    border-radius:12px;
    font-weight:700;
}

.btn:hover{
    opacity:.9;
}
</style>
</head>
<body>

<div class="card">
    <div class="logo">
        🐸
    </div>

    <h1>ゲコ<span>ランド</span></h1>

    <p class="desc">
        ゲコランドのURLが変更されました。<br>
        5秒後に新しいURLへ自動で移動します。
    </p>

    <div class="url">
        <a href="https://kae1u.github.io/gekoland/">
            https://kae1u.github.io/gekoland/
        </a>
    </div>

    <div class="countdown">
        <span id="count">3</span>秒後に移動します...
    </div>

    <a class="btn" href="https://kae1u.github.io/gekoland/">
        今すぐ移動
    </a>
</div>

<script>
let sec = 5;

const timer = setInterval(() => {
    sec--;
    document.getElementById("count").textContent = sec;

    if(sec <= 0){
        clearInterval(timer);
        location.href = "https://kae1u.github.io/gekoland/";
    }
}, 1000);
</script>

</body>
</html>
